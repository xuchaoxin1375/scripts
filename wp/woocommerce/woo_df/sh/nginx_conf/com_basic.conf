# 对于无关紧要的请求忽略其日志(典型的/favicon.ico网站图标请求)
location = /favicon.ico {
    access_log off; # 不记录 access log
    log_not_found off; # 即使文件不存在，也不记录 error log
    return 204; # 返回空响应,204 表示请求成功,但无内容

}

