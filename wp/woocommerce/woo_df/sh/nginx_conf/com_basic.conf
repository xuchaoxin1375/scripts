# /www/server/nginx/conf/com.conf -> /www/sh/nginx_conf/com.conf
# ====限制非正常客户添加购物车(恶意或者不必要的add-to-cart行为)====================
# 检查是否包含 add-to-cart 查询参数在server块上下文中,会被各location上下文所继承
# 例如googlebot可能会访问 "GET /product/.../?add-to-cart=147667 HTTP/1.1"
# 其他伪装UA或人类用户的爬虫比如: "GET /?add-to-cart=263827 HTTP/1.1"

# 经过模拟测试和初步分析可知,对于启用了ajax的模板,正常用户买产品的日志中仅有一条和add to cart相关的日志
# (对于首页产品,整页产品加载完毕之前和之后再点击效果不同)
# 核心购物操作:点击模板产品卡片添加购物车按钮触发:POST /?wc-ajax=add_to_cart (基础行为),
# 有的模板,可能附带POST /wp-admin/admin-ajax.php,GET /?wc-ajax=get_refreshed_fragments 等其他副操作
# 如果从产品详情页点击添加购物车也不会有add-to-cart相关记录(注意连字符和下划线的区别)
# 对于add_to_cart的链接可以考虑做专门的限流,而对add-to-cart做限制访问

# [特殊情况add-to-cart]
# 1.有些模板没有使用ajax添加购物车,比如首页点击添加购物车,会访问add-to-cart链接,这种情况下考虑不禁用add-to-cart路径
# 2.多数模板在首页上展示的产品卡片上的如果有购物车按钮,并且首页还么有来得及加载完毕,用户就点击了添加购物车按钮,也会访问add-to-cart链接,
#   但是正常客户不太可能这么做,一般只会发生在网站检查的时候.



# 自定义特殊日志记录
# 使用变量(比如$server_name)可以为不同网站产生各自的日志文件,如果为了使用fail2ban集中分析可疑恶意请求,则可以集中到同一个可疑日志文件中
access_log /www/wwwlogs/warn.log combined if=$log_warn;
# access_log /www/wwwlogs/$server_name.warn.log combined if=$log_warn;
access_log /www/wwwlogs/all.log main_format_lite ;
access_log /www/wwwlogs/spider.log main_format_lite if=$allow_bot;
# access_log /www/wwwlogs/$server_name.log main_format;

# include /www/server/nginx/conf/com_js_signed.conf; #openresty方案

# 匹配所有查询参数中包含"add-to-cart=" 字符串的请求
# 方案1:使用map(总配置http上下文中定义变量$has_add_to_cart)+if
if ($has_add_to_cart) {
    return 403;
}
# 方案2:直接使用if
# if ($args ~* "add-to-cart=") {
#     return            403;
# }

# =====基础限流=====================
# 对所有产品页相关链接限流(严格级别,对用户体验有一定影响,一般情况下,对大多数爬虫有显著效果)
# 普通产品限流🎈

# 对图片限流
location ~* ^/wp-content/uploads/.*\.(webp|jpg|png)$ {
    # 针对图片爬虫的专用日志文件(可供配合fail2ban)
    access_log /www/wwwlogs/imgs.log combined;
    # 图片限流
    limit_req zone=img_limit burst=80 nodelay;
    #                 限制下载速度 (KB/s)
    limit_rate 300k;

    #                 缓存优化
    expires 1y;
    add_header Cache-Control "public, immutable";

    #                 静态文件直接返回(检查 $uri（请求路径对应的物理文件）是否存在,存在直接返回,否则404；)
    try_files $uri =404;
}


# ===================== 禁止访问敏感路径 =====================
# 防止路径遍历和双斜杠绕过(多斜杠,由于是正则匹配(包含检查),所以超过2个斜杠也会被命中,无需使用//+或/{2,}匹配)
if ($request_uri ~* "//") {
    return 444;
}
# 防止访问包含敏感关键词的路径
# /wordpress/ 这个路径需要谨慎,部分后台管理页面可能会跳转到包含此字符串的路径
# "GET /wp-includes/js/tinymce/skins/wordpress/wp-content.css?ver=6.8.1&wp-mce-49110-20201110 HTTP/1.1"
location ~* (wp-login|xmlrpc|wlwmanifest\.xml|SystemConfig|/setup-config\.php) {
    return 444;
    #                 access_log off;
    #                 log_not_found off;
}

# --- 禁止访问 WordPress 登录页及配置文件 ---
# 限制用户枚举扫描,可以配合fail2ban使用
# 限制 REST API 用户枚举
# 粗暴禁止访问或跳转到/wp-login.php，配置不当的话部分情况会拦住自己人，如有特殊需要，可以临时开放
# (通常正确安装并激活wps-hide-login后不会被此规则拦截，自己人使用约定的入口url可以登录后台)
# 如果不需要使用api可以限制/api,但是不能直接限制api关键词,否则一些用户操作会受影响
# 比如查看购车中的商品 wp-includes/js/dist/api-fetch.min.js?
# 此外/wp-json/也不能直接限制,否则有的模板购物车页面数量增减会失败!(POST /wp-json/wc/store/v1/batch?_locale=site)
# 还有/wc-api/有时跳转会用到

# 这里的(/|$)不能写成[/$],这里的$符号在[]中是字面量而非结尾之意
location ~* wp-login|/api(/|$)|/\?author=\d+|/wp-json/wp/v\d+/users {
    deny all;
    return 444;
}

location ~* /\.(git|svn|hg|env|ssh|DS_Store) {
    deny all;
    return 444;
}

# --- 屏蔽数据库/备份文件 ---
location ~* /(dump\.sql|backup(\.sql|\.tar\.gz|\.zip|\.bak)?|database(_backup)?\.sql|schema\.rb) {
    deny all;
    return 444;
}

# --- 屏蔽配置/凭证文件 ---
location ~* /(config(\.json|\.ya?ml|\.php|\.xml)?|secrets?\.json|user_secrets\.yml|production\.json|credentials|id_(rsa|ecdsa|ed25519)|server\.key|\.pem) {
    deny all;
    return 444;
}

# --- 屏蔽开发工具配置 ---
location ~* /(\.vscode|\.idea|sftp\.json|docker-compose\.ya?ml|cloud-config\.ya?ml) {
    deny all;
    return 444;
}

# --- 屏蔽敏感调试接口 ---
location ~* /(phpinfo\.php|server-status|_vti_pvt/service\.pwd) {
    deny all;
    return 444;
}


# 拒绝非 Google/Bing 爬虫
if ($allow_access_ua = 0) {
    return 444; # 直接断开连接
}

# 禁止google访问添加到购物车按钮链接
if ($block_googlebot_cart) {
    return 403;
}
# 禁止CN用户访问(在各个vhost或者共同include的共用com.conf中加入此段)
if ($block_cn = 1) {
    return 444;
}
# 以下国家/语言白名单仅在紧急情况启用(常态下有副作用)
# if ($allowed_country = 0){
# 直接断连
#     return 444;
# 或者返回一段自定义文字
#    add_header Content-Type text/plain;
#   return 403 "Access Denied: Country not allowed.";
# }
# if ($allowed_country_lang = 0){
#     return 444;
