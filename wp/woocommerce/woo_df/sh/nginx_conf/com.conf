# --- 保护 wp-cron.php（可选）---
# 正常应由内部触发，不建议公开访问

location = /wp-cron.php {
    # deny all;  # 如果你用系统 cron 替代
    allow 127.0.0.1;  # 只允许本地或 Cloudflare（谨慎）
    # allow 172.68.0.0/16;  # Cloudflare IP 段（可选）
    deny all;
}

