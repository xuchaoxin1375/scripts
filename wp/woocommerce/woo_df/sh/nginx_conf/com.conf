


# --- 拦截 xmlrpc.php ---
location = /xmlrpc.php {
    deny all;
    # 返回 444 断开连接（比 403 更隐蔽）
    return 444;
    # return 403;
}

# 精确匹配：/wp-admin
location = /wp-admin {
    return 403;
}
# 粗暴禁止访问或跳转到/wp-login.php,配置不当的话部分情况会拦住自己人,如有特殊需要,可以临时开放
# (通常正确安装并激活wps-hide-login后不会被此规则拦截,自己人使用约定的入口url可以登录后台)
location = /wp-login.php{
    return 403;
}
# 拒绝非 Google/Bing 爬虫
if ($allow_access = 0) {
    return 444; # 直接断开连接
}
