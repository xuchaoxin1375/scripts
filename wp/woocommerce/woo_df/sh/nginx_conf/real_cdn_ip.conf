# 宝塔默认的CDN IP 配置，允许所有 IP 地址作为真实客户端 IP 的来源，并使用 X-Forwarded-For 头部来获取真实客户端 IP 地址。
# 这类配置和宝塔自带的"cdn来源ip解析"功能重叠,且不能同时使用,二选一,这里适合自动化部署服务器.
# 原则上这个方案是不安全的,但是特殊情况在可以稍加改造使用(低于特殊解析ip的服务器.)
# 建议使用set_real_ip_from指定更加严格的网段.
set_real_ip_from 0.0.0.0/0;
set_real_ip_from ::/0;
# 从指定请求头中解析客户ip.
real_ip_header X-Forwarded-For;